<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Maintenance</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:600px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    opacity:0.9;
}

.loader{
    margin:30px auto;
    border:6px solid rgba(255,255,255,0.2);
    border-top:6px solid white;
    border-radius:50%;
    width:50px;
    height:50px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

.footer{
    margin-top:25px;
    font-size:14px;
    opacity:0.7;
}
</style>

</head>
<body>

<div class="container">

<h1>🔧 Maintenance | konedl Website will back soon</h1>

<p>
Our server is currently under maintenance.<br>
We are working to fix the issue and will be back online shortly.
</p>

<div class="loader"></div>

<p>Please check back later.</p>

<div class="footer">
© 2026 Konedl.site
</div>

</div>

</body>
</html>
